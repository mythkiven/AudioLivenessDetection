name: Bug report
description: Report incorrect behavior or a crash
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include reproduction steps and environment details.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and expected behavior.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. swift run AudioLivenessDemoCLI
        2. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v1.0.0 or commit SHA
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - iOS
        - Other
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: e.g. macOS 14.5, iOS 17.4

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant `[AudioLiveness]` log output
      render: shell
