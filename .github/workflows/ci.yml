name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v

      - name: Build macOS CLI demo
        run: swift build -c release --product AudioLivenessDemoCLI
